services:
  - type: web
    name: aqi-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ALERT_EMAIL_SENDER
        sync: false
      - key: ALERT_EMAIL_RECEIVER
        sync: false
      - key: ALERT_EMAIL_PASSWORD
        sync: false
